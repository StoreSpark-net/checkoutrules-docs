name: Sync Gleap Help Center

on:
  push:
    branches:
      - main
    paths:
      - "docs.json"
      - "guides/**"
      - "snippets/**"
      - "images/**"
      - "scripts/sync-to-gleap.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sync-gleap.yml"
  workflow_dispatch:

concurrency:
  group: sync-gleap-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-gleap:
    name: Sync docs to Gleap
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GLEAP_API_KEY: ${{ secrets.GLEAP_API_KEY }}
      GLEAP_PROJECT_ID: ${{ secrets.GLEAP_PROJECT_ID }}
      DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure required secrets are present
        run: |
          test -n "$GLEAP_API_KEY"
          test -n "$GLEAP_PROJECT_ID"

      - name: Sync docs to Gleap
        run: npm run sync-gleap

      - name: Print success message
        run: echo "Sync completed successfully"
